<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" viewBox="0 0 720 280" role="img" aria-label="Chat view schematic">
  <title>Chat view schematic</title>
  <desc>Sync options, genre mode, chips, message list, input. Matches view-chat.</desc>
  <rect width="720" height="280" fill="#f1f5f9"/>
  <rect x="16" y="16" width="688" height="248" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="36" y="48" fill="#0f172a" font-family="system-ui,Segoe UI,sans-serif" font-size="16" font-weight="700">Chat</text>
  <rect x="36" y="58" width="200" height="6" rx="2" fill="#e2e8f0"/>
  <rect x="36" y="76" width="460" height="16" rx="4" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="44" y="88" fill="#065f46" font-family="system-ui,Segoe UI,sans-serif" font-size="10">Panel sync, world.md, mode: novel / game / CoC / DnD</text>
  <rect x="36" y="104" width="200" height="20" rx="4" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="44" y="118" fill="#475569" font-family="system-ui,Segoe UI,sans-serif" font-size="9">Chips, faction key-figures strip</text>
  <rect x="36" y="136" width="648" height="72" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="48" y="172" fill="#94a3b8" font-family="system-ui,Segoe UI,sans-serif" font-size="11">Messages (user / assistant)</text>
  <rect x="36" y="218" width="648" height="36" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="48" y="240" fill="#64748b" font-family="system-ui,Segoe UI,sans-serif" font-size="11">Composer, Ctrl+Enter to send</text>
  <text x="36" y="268" fill="#94a3b8" font-family="system-ui,Segoe UI,sans-serif" font-size="9">Schematic, not a pixel screenshot.</text>
</svg>
